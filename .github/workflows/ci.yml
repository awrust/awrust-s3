name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Unit tests
        run: cargo test --workspace

      - name: Release build
        run: cargo build --release

  integration:
    name: Integration Tests (${{ matrix.store }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        store: [memory, fs]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r tests/integration/requirements.txt

      - name: Build server
        run: cargo build -p awrust-s3-server

      - name: Run BDD tests
        working-directory: tests/integration
        env:
          STORE: ${{ matrix.store }}
        run: behave

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -f docker/Dockerfile -t awrust-s3:ci .
